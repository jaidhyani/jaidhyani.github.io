<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singularity Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300&family=Anybody:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060606;
    --card-bg: #0e0e0e;
    --text: #d4cec4;
    --text-dim: #6b6560;
    --accent: #b8886a;
    --accent-dim: rgba(184, 136, 106, 0.12);
    --border: #1a1816;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Anybody', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    z-index: 9999;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 6rem 2rem 4rem;
  }

  header {
    margin-bottom: 5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }

  header h1 {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.4s ease, transform 0.4s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .card:hover .thumb::after {
    opacity: 0;
  }

  .thumb {
    aspect-ratio: 16 / 10;
    position: relative;
    overflow: hidden;
  }

  .thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--card-bg) 0%, transparent 50%);
    transition: opacity 0.4s ease;
  }

  .card-body {
    padding: 1.4rem 1.6rem 1.6rem;
  }

  .card-title {
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-size: 1.5rem;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .tag {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0.25rem 0.6rem;
    border-radius: 1px;
    font-weight: 400;
  }

  .author {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ── unique thumb visuals ── */

  .thumb-egg {
    background:
      radial-gradient(ellipse 60% 80% at 50% 50%, #e8d5b8 0%, #c4a882 30%, transparent 70%),
      radial-gradient(circle at 30% 70%, rgba(255,220,180,0.15) 0%, transparent 50%),
      #1a1510;
  }

  .thumb-pantheon {
    background:
      repeating-conic-gradient(from 0deg at 50% 110%, #1a3a4a 0deg 15deg, transparent 15deg 30deg),
      linear-gradient(170deg, #0c2233 0%, #1a4455 40%, #0a1a28 100%);
    background-blend-mode: overlay;
  }

  .thumb-paperclips {
    background:
      repeating-linear-gradient(45deg, transparent 0px, transparent 8px, rgba(180,180,190,0.06) 8px, rgba(180,180,190,0.06) 9px),
      repeating-linear-gradient(-45deg, transparent 0px, transparent 12px, rgba(180,180,190,0.04) 12px, rgba(180,180,190,0.04) 13px),
      radial-gradient(circle at 70% 40%, #2a2a30 0%, #0a0a0c 100%);
  }

  .thumb-lena {
    background:
      linear-gradient(135deg, transparent 40%, rgba(120,40,40,0.3) 60%, transparent 80%),
      repeating-linear-gradient(0deg, rgba(100,255,100,0.02) 0px, rgba(100,255,100,0.02) 1px, transparent 1px, transparent 3px),
      linear-gradient(180deg, #0a100a 0%, #141a14 50%, #0a0c0a 100%);
  }

  .thumb-permutation {
    background:
      conic-gradient(from 45deg at 60% 50%, #1a1028, #28184a, #1a1028, #0e0a18, #1a1028),
      repeating-radial-gradient(circle at 40% 40%, transparent 0px, transparent 20px, rgba(100,60,180,0.05) 20px, rgba(100,60,180,0.05) 21px);
  }

  .thumb-birthdays {
    background:
      radial-gradient(circle at 20% 30%, rgba(255,160,60,0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(255,100,40,0.1) 0%, transparent 35%),
      radial-gradient(circle at 50% 80%, rgba(255,200,100,0.08) 0%, transparent 50%),
      linear-gradient(160deg, #140c04 0%, #1a1008 40%, #0c0804 100%);
  }

  @media (max-width: 680px) {
    .page { padding: 3rem 1.2rem 3rem; }
    header { margin-bottom: 3rem; }
    .grid { grid-template-columns: 1fr; gap: 1.5rem; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Singularity</h1>
  </header>

  <div class="grid">

    <a class="card" href="http://www.galactanet.com/oneoff/theegg_mod.html" target="_blank" rel="noopener">
      <div class="thumb thumb-egg"></div>
      <div class="card-body">
        <div class="card-title">The Egg</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">Andy Weir</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://www.imdb.com/title/tt11680642/" target="_blank" rel="noopener">
      <div class="thumb thumb-pantheon"></div>
      <div class="card-body">
        <div class="card-title">Pantheon</div>
        <div class="card-meta">
          <span class="tag">Series</span>
          <span class="author">AMC+</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://www.decisionproblem.com/paperclips/" target="_blank" rel="noopener">
      <div class="thumb thumb-paperclips"></div>
      <div class="card-body">
        <div class="card-title">Universal Paperclips</div>
        <div class="card-meta">
          <span class="tag">Game</span>
          <span class="author">Frank Lantz</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://qntm.org/mmacevedo" target="_blank" rel="noopener">
      <div class="thumb thumb-lena"></div>
      <div class="card-body">
        <div class="card-title">Lena</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">qntm</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://www.goodreads.com/book/show/156784.Permutation_City" target="_blank" rel="noopener">
      <div class="thumb thumb-permutation"></div>
      <div class="card-body">
        <div class="card-title">Permutation City</div>
        <div class="card-meta">
          <span class="tag">Novel</span>
          <span class="author">Greg Egan</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://reactormag.com/reprints-seven-birthdays-ken-liu/" target="_blank" rel="noopener">
      <div class="thumb thumb-birthdays"></div>
      <div class="card-body">
        <div class="card-title">Seven Birthdays</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">Ken Liu</span>
        </div>
      </div>
    </a>

  </div>
</div>
</body>
</html>
