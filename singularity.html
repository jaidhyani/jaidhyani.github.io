<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singularity World-Building Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300&family=Anybody:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060606;
    --card-bg: #0e0e0e;
    --text: #d4cec4;
    --text-dim: #6b6560;
    --accent: #b8886a;
    --accent-dim: rgba(184, 136, 106, 0.12);
    --border: #1a1816;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Anybody', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    z-index: 9999;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 6rem 2rem 4rem;
  }

  header {
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }

  header h1 {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .alt-link {
    display: inline-block;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.2rem;
    transition: color 0.3s, border-color 0.3s;
  }

  .alt-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    margin-top: 3rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.4s ease, transform 0.4s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .card:hover .thumb img {
    transform: scale(1.04);
  }

  .thumb {
    aspect-ratio: 16 / 10;
    position: relative;
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }

  .thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--card-bg) 0%, transparent 40%);
    pointer-events: none;
  }

  .card-body {
    padding: 1.4rem 1.6rem 1.6rem;
  }

  .card-title {
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-size: 1.5rem;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .tag {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0.25rem 0.6rem;
    border-radius: 1px;
    font-weight: 400;
  }

  .author {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 680px) {
    .page { padding: 3rem 1.2rem 3rem; }
    header { margin-bottom: 2rem; }
    .grid { grid-template-columns: 1fr; gap: 1.5rem; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Singularity World-Building Media</h1>
    <a class="alt-link" href="singularity-claude.html">Claude's version &rarr;</a>
  </header>

  <div class="section-label">Game</div>
  <div class="grid">
    <a class="card" href="https://www.decisionproblem.com/paperclips/" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/paperclips.webp" alt="Universal Paperclips" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">Universal Paperclips</div>
        <div class="card-meta">
          <span class="tag">Game</span>
          <span class="author">Frank Lantz</span>
        </div>
      </div>
    </a>
  </div>

  <div class="section-label">Novel</div>
  <div class="grid">
    <a class="card" href="https://www.goodreads.com/book/show/156784.Permutation_City" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/permutation-city.webp" alt="Permutation City" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">Permutation City</div>
        <div class="card-meta">
          <span class="tag">Novel</span>
          <span class="author">Greg Egan</span>
        </div>
      </div>
    </a>
  </div>

  <div class="section-label">Series</div>
  <div class="grid">
    <a class="card" href="https://www.netflix.com/title/81937398" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/pantheon.webp" alt="Pantheon" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">Pantheon</div>
        <div class="card-meta">
          <span class="tag">Series</span>
          <span class="author">Netflix</span>
        </div>
      </div>
    </a>
  </div>

  <div class="section-label">Short Stories</div>
  <div class="grid">

    <a class="card" href="http://www.galactanet.com/oneoff/theegg_mod.html" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/the-egg.webp" alt="The Egg" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">The Egg</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">Andy Weir</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://qntm.org/mmacevedo" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/lena.webp" alt="Lena" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">Lena</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">qntm</span>
        </div>
      </div>
    </a>

    <a class="card" href="https://reactormag.com/reprints-seven-birthdays-ken-liu/" target="_blank" rel="noopener">
      <div class="thumb"><img src="singularity-img/seven-birthdays.webp" alt="Seven Birthdays" loading="lazy"></div>
      <div class="card-body">
        <div class="card-title">Seven Birthdays</div>
        <div class="card-meta">
          <span class="tag">Short Story</span>
          <span class="author">Ken Liu</span>
        </div>
      </div>
    </a>

  </div>
</div>
</body>
</html>
